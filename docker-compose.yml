name: playmusic

services:
  # Local Database
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: playmusic_db
  #   restart: always
  #   environment:
  #     POSTGRES_USER: playmusic
  #     POSTGRES_PASSWORD: playmusic123
  #     POSTGRES_DB: playmusic
  #   ports:
  #     - "5455:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data

  # High-speed caching for room codes
  redis:
    image: redis:7-alpine
    container_name: playmusic_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "6104:6379" # untuk RedisInsight
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - app_net

  # Bun Backend Server
  server:
    build: 
      context: ./server
    container_name: playmusic_server
    restart: always
    networks:
      - app_net
    ports:
      - "127.0.0.1:20004:3001"
    # environment:
    #   DATABASE_URL: postgresql://playmusic:password@postgres:5432/playmusic?sslmode=disable
    #   REDIS_URL: redis://redis:6379
    #   ADMIN_INVITE_CODE: PLAY-ADMIN-2026
    env_file:
      - .env
    volumes:
      - ./server:/app
      - /app/node_modules
    depends_on:
      # - postgres
      - redis

  # Vite Frontend Client
  client:
    build: 
      context: ./client
    container_name: playmusic_client
    restart: always
    networks:
      - app_net
    ports:
      - "127.0.0.1:21010:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - server

volumes:
  # postgres_data:
  redis_data:

networks:
  app_net:
    name: iknoball_app_net
    driver: bridge